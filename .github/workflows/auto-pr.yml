# Auto-create a draft PR when a feature branch is first pushed.
name: Open pull request

on:
  push:
    branches:
      - "feature/**"

jobs:
  open-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --head "$GITHUB_REF_NAME" \
            --base main \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for $GITHUB_REF_NAME"
            exit 0
          fi

          TITLE=$(git log -1 --pretty=%s)

          gh pr create \
            --base main \
            --head "$GITHUB_REF_NAME" \
            --title "$TITLE" \
            --body "Auto-created PR for \`$GITHUB_REF_NAME\`."
