# Reusable workflow: build and deploy teaching content.
#
# Called by organisation repos on push to main.
# Validates, compiles MDX to JSON, syncs compiled content + images to GCS,
# then triggers the backend sync endpoint to upsert module metadata.
name: Deploy teaching content

on:
  workflow_call:
    inputs:
      org_id:
        description: "Organisation identifier (e.g. eoeeta, respiratory)"
        required: true
        type: string
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT:
        required: true
      GCP_TEACHING_GCS_BUCKET:
        required: true
      BACKEND_SYNC_URL:
        description: "Backend sync endpoint URL"
        required: true
      BACKEND_SYNC_TOKEN:
        description: "Service token for backend sync API"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out content repo
        uses: actions/checkout@v6
        with:
          path: content

      - name: Check out teaching-tooling
        uses: actions/checkout@v6
        with:
          repository: bailey-medics/teaching-tooling
          path: tooling

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r tooling/requirements.txt

      - name: Validate module metadata
        run: python tooling/scripts/validate.py content/modules/

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Node deps
        working-directory: tooling
        run: npm ci

      - name: Validate MDX content
        run: node tooling/scripts/validate_mdx.js content/modules/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v3

      - name: Sync to GCS
        run: |
          BUCKET="${{ secrets.GCP_TEACHING_GCS_BUCKET }}"

          # Sync each module's assessment content to questions/<bank_id>/
          # and learning content to learning/<bank_id>/
          # and module metadata to modules/<bank_id>/
          for module_dir in content/modules/*/; do
            bank_id=$(basename "$module_dir")

            # Assessment content → questions/<bank_id>/
            if [ -d "$module_dir/assessment" ]; then
              gsutil -m rsync -r -d \
                "$module_dir/assessment/" \
                "gs://$BUCKET/questions/$bank_id/"
            fi

            # Learning content → learning/<bank_id>/
            if [ -d "$module_dir/learning" ]; then
              gsutil -m rsync -r -d \
                "$module_dir/learning/" \
                "gs://$BUCKET/learning/$bank_id/"
            fi

            # Module metadata → modules/<bank_id>/
            if [ -f "$module_dir/module.yaml" ]; then
              gsutil cp "$module_dir/module.yaml" \
                "gs://$BUCKET/modules/$bank_id/module.yaml"
            fi
          done

      - name: Trigger backend sync
        run: |
          # Notify the backend to re-read module metadata from GCS
          curl -sf -X POST \
            "${{ secrets.BACKEND_SYNC_URL }}/api/ci/teaching/sync" \
            -H "Authorization: Bearer ${{ secrets.BACKEND_SYNC_TOKEN }}" \
            -H "Content-Type: application/json"
